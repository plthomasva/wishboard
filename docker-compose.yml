services:
  db:
    # Pinned (not :latest) for reproducible, offline-safe deploys. sqld 0.24.33
    # broke stats-file persistence under our rootless-Docker volume; 0.24.32 is
    # the last-known-good. Bumps come via Dependabot (docker-compose) as PRs.
    # Changing this minor/major may require recreating the db_data volume.
    image: ghcr.io/tursodatabase/libsql-server:v0.24.33
    container_name: wishboard-db
    user: "${WISHBOARD_UID:-1000}:${WISHBOARD_GID:-1000}"
    volumes:
      - ./data/db:/var/lib/sqld
    restart: unless-stopped
    environment:
      - RUST_LOG=info

  wishboard:
    image: ghcr.io/plthomasva/wishboard:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wishboard
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=http://db:8080
      # Public domain + AP IP for the poster/Wi-Fi popup, resolved at runtime via
      # /api/config. Substituted from the .env that build-kiosk.sh writes (empty in
      # a bare `docker compose up`, which is fine — the client falls back to the host).
      - WISHBOARD_DOMAIN=${WISHBOARD_DOMAIN:-}
      - WISHBOARD_AP_IP=${WISHBOARD_AP_IP:-}
      # - WISHBOARD_ADMIN_USERNAME=admin
      # - WISHBOARD_ADMIN_SECRET=admin-board
      # - CORS_ALLOWED_ORIGINS=http://your-domain.com
