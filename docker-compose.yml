services:
  db:
    # Pinned (not :latest) for reproducible, offline-safe deploys. sqld 0.24.33
    # broke stats-file persistence under our rootless-Docker volume; 0.24.32 is
    # the last-known-good. Bumps come via Dependabot (docker-compose) as PRs.
    # Changing this minor/major may require recreating the db_data volume.
    image: ghcr.io/tursodatabase/libsql-server:v0.24.32
    container_name: wishboard-db
    user: '0:0'
    volumes:
      - db_data:/var/lib/sqld
    restart: unless-stopped
    environment:
      - RUST_LOG=info

  wishboard:
    image: ghcr.io/plthomasva/wishboard:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wishboard
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=http://db:8080
      # - WISHBOARD_ADMIN_USERNAME=admin
      # - WISHBOARD_ADMIN_SECRET=admin-board
      # - CORS_ALLOWED_ORIGINS=http://your-domain.com

volumes:
  db_data:
