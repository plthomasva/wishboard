AWSTemplateFormatVersion: '2010-09-09'
Description: Provisions GitHub OIDC identity provider and IAM Role for Wishboard serverless deployments.

Parameters:
  GitHubOrg:
    Type: String
    Default: plthomasva
    Description: GitHub Organization or Username.
  GitHubRepo:
    Type: String
    Default: wishboard
    Description: GitHub Repository Name.
  OidcProviderArn:
    Type: String
    Default: ""
    Description: (Optional) Existing OIDC Provider ARN. If empty, a new OIDC Provider will be created.

Conditions:
  CreateOIDCProvider: !Equals [!Ref OidcProviderArn, ""]

Resources:
  GithubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # Standard thumbprints for token.actions.githubusercontent.com
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GithubDeployerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${GitHubRepo}-github-deployer-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If [CreateOIDCProvider, !Ref GithubOidcProvider, !Ref OidcProviderArn]
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: WishboardDeployerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # 1. CloudFormation Stack Management
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:UpdateStack
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStackResource
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/wishboard-serverless*/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/aws-sam-cli-managed-default/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31"

              # 2. S3 Bucket Management (SAM source artifacts, frontend assets, images)
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:PutLifecycleConfiguration
                  - s3:GetBucketTagging
                  - s3:PutBucketTagging
                Resource:
                  - "arn:aws:s3:::wishboard-*"
                  - "arn:aws:s3:::aws-sam-cli-managed-default-*"

              # 3. IAM Role Management (Lambda execution roles created by SAM)
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRoleTags
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/wishboard-*"

              # 4. Lambda Function Management
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:GetFunctionConfiguration
                  - lambda:ListTags
                  - lambda:TagResource
                  - lambda:UntagResource
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:wishboard-*"

              # 5a. API Gateway Creation
              - Effect: Allow
                Action:
                  - apigateway:POST
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis"
                Condition:
                  StringEquals:
                    "aws:RequestTag/Project": !Ref GitHubRepo

              # 5b. API Gateway Management
              - Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:PUT
                  - apigateway:DELETE
                  - apigateway:PATCH
                  - apigateway:POST
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis/*"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/tags/*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/Project": !Ref GitHubRepo

              # 6a. EFS File System & Access Point Creation
              - Effect: Allow
                Action:
                  - elasticfilesystem:CreateFileSystem
                  - elasticfilesystem:CreateAccessPoint
                Resource:
                  - !Sub "arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/*"
                  - !Sub "arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:access-point/*"
                Condition:
                  StringEquals:
                    "aws:RequestTag/Project": !Ref GitHubRepo

              # 6b. EFS File System & Access Point Management
              - Effect: Allow
                Action:
                  - elasticfilesystem:DeleteFileSystem
                  - elasticfilesystem:CreateMountTarget
                  - elasticfilesystem:DeleteMountTarget
                  - elasticfilesystem:DeleteAccessPoint
                  - elasticfilesystem:TagResource
                  - elasticfilesystem:UntagResource
                Resource:
                  - !Sub "arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/*"
                  - !Sub "arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:access-point/*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/Project": !Ref GitHubRepo

              # 6c. EFS Describing (Read-only, no resource-level permissions)
              - Effect: Allow
                Action:
                  - elasticfilesystem:DescribeFileSystems
                  - elasticfilesystem:DescribeMountTargets
                  - elasticfilesystem:DescribeAccessPoints
                  - elasticfilesystem:DescribeReplicationConfigurations
                Resource: "*"

              # 7a. CloudFront Distribution Creation
              - Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:RequestTag/Project": !Ref GitHubRepo

              # 7b. CloudFront Distribution Management
              - Effect: Allow
                Action:
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetDistributionConfig
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                Resource:
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/Project": !Ref GitHubRepo

              # 7c. CloudFront Origin Access Control Management
              - Effect: Allow
                Action:
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                Resource:
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:origin-access-control/*"

              # 8a. Taggable EC2 Resource Creation
              - Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:CreateSubnet
                  - ec2:CreateInternetGateway
                  - ec2:CreateRouteTable
                  - ec2:CreateSecurityGroup
                  - ec2:CreateVpcEndpoint
                  - ec2:CreateNetworkInterface
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:subnet/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:internet-gateway/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:route-table/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc-endpoint/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:network-interface/*"
                Condition:
                  StringEquals:
                    "aws:RequestTag/Project": !Ref GitHubRepo

              # 8b. Taggable EC2 Resource Deletion / Modification
              - Effect: Allow
                Action:
                  - ec2:DeleteVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:DeleteSubnet
                  - ec2:ModifySubnetAttribute
                  - ec2:DeleteInternetGateway
                  - ec2:DeleteRouteTable
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteVpcEndpoint
                  - ec2:DeleteNetworkInterface
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:subnet/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:internet-gateway/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:route-table/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc-endpoint/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:network-interface/*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/Project": !Ref GitHubRepo

              # 8c. EC2 Operations on existing resources (rules, routes, attachments)
              - Effect: Allow
                Action:
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:ReplaceRoute
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:subnet/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:internet-gateway/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:route-table/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/Project": !Ref GitHubRepo

              # 8d. EC2 Tag Management
              - Effect: Allow
                Action:
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:subnet/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:internet-gateway/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:route-table/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc-endpoint/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:network-interface/*"
                Condition:
                  StringEquals:
                    "aws:RequestTag/Project": !Ref GitHubRepo

              # 8e. EC2 Describe (Read-only, no resource-level permissions)
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeRouteTables
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeVpcEndpoints
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeRouteTableAssociations
                Resource: "*"

              # 9. CloudWatch Logs (LogGroups creation for Lambda)
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/wishboard-*"

              # 10a. Route 53 Custom Domain Configuration
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                  - route53:GetChange
                Resource:
                  - !Sub "arn:aws:route53:::hostedzone/*"
                  - !Sub "arn:aws:route53:::change/*"

              # 10b. ACM Certificate Configuration
              - Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:AddTagsToCertificate
                  - acm:RemoveTagsFromCertificate
                Resource:
                  - !Sub "arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/*"

              # 11. STS Get Caller Identity
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"

Outputs:
  RoleArn:
    Value: !GetAtt GithubDeployerRole.Arn
    Description: ARN of the GitHub Actions deployment role.
