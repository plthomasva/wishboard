name: Daily Mutation Testing (Stryker)

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: '24' # Use the project's supported node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Build Application
        run: npm run build

      - name: Run Stryker Mutation Tests
        run: npx --no-install stryker run --concurrency 2
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        continue-on-error: true # Keep deploying the report even if mutants survive and the process exits with an error code

      - name: Generate Mutation Summary
        if: always()
        run: node scripts/generate-mutation-summary.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Report to Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './reports/mutation' # The directory Stryker writes the HTML report to

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
