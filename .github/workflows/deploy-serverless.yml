name: Deploy Serverless

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode (dev or prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      region:
        description: 'AWS region to deploy to (falls back to AWS_REGION variable)'
        required: false
        type: string
      stack_name:
        description: 'CloudFormation stack name (falls back to AWS_STACK_NAME variable)'
        required: false
        type: string
  push:
    branches:
      - fix/add-gitlab-runner-deployment

permissions:
  id-token: write # Required for requesting the AWS JWT
  contents: read # Required for checking out the repository

jobs:
  deploy:
    name: Deploy Stack
    runs-on: ubuntu-latest

    env:
      # Inject parameter overrides from GitHub Variables if configured
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
      ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ github.event.inputs.region || vars.AWS_REGION || 'us-east-1' }}
          audience: sts.amazonaws.com

      - name: Run serverless deploy script
        run: |
          chmod +x ./scripts/deploy-serverless.sh
          ./scripts/deploy-serverless.sh \
            --mode "${{ github.event.inputs.mode || 'dev' }}" \
            --region "${{ github.event.inputs.region || vars.AWS_REGION || 'us-east-1' }}" \
            --stack-name "${{ github.event.inputs.stack_name || vars.AWS_STACK_NAME || 'wishboard-serverless-dev' }}"
