name: Node.js CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  build:
    if: ${{ !startsWith(github.head_ref, 'release-please-') }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full history: better SonarQube relevancy and complete gitleaks scan
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Install dependencies
        run: npm ci

      # Cheap, version-independent checks — run once (on 24.x) and fail fast.
      - name: Lint
        if: matrix.node-version == '24.x'
        run: npm run lint
      - name: Type check
        if: matrix.node-version == '24.x'
        run: npm run type-check
      - name: Format check
        if: matrix.node-version == '24.x'
        run: npm run format:check
      - name: Gitleaks secret scan
        if: matrix.node-version == '24.x'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for GitHub organizations; omit for
          # personal / public repos.

      - name: Build
        run: npm run build --if-present
      - name: Test and Coverage
        run: npm run test:coverage
      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]' && matrix.node-version == '22.x'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
