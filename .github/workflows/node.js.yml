name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read


jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install native build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3 pkg-config libsqlite3-dev gcc-14 g++-14
    - name: Configure modern compiler for native builds
      run: |
        echo "CC=/usr/bin/gcc-14" >> $GITHUB_ENV
        echo "CXX=/usr/bin/g++-14" >> $GITHUB_ENV
    - name: Cache SonarCloud packages
      uses: actions/cache@v5
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    - name: Install dependencies
      run: npm ci --ignore-scripts && npm rebuild better-sqlite3
    - run: npm run build --if-present
    - name: Test and Coverage
      run: npm run test:coverage
    - name: SonarCloud Scan
      if: github.actor != 'dependabot[bot]' && matrix.node-version == '22.x'
      uses: SonarSource/sonarqube-scan-action@v8.2.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
