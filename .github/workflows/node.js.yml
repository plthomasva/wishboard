# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 24.x]
        # Testing both the current LTS and the latest supported Node version is best practice.

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install native build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3 pkg-config libsqlite3-dev gcc-14 g++-14
    - name: Configure modern compiler for native builds
      run: |
        echo "CC=/usr/bin/gcc-14" >> $GITHUB_ENV
        echo "CXX=/usr/bin/g++-14" >> $GITHUB_ENV
    - name: Install dependencies
      run: npm ci
    - run: npm run build --if-present
    - run: npm test
