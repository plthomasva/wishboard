name: Node.js CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  # Cancel superseded runs for the same ref (rapid PR pushes / force-pushes).
  # Grouped by ref so different PRs never cancel each other.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-checks:
    name: Code Quality & Security
    if: ${{ !startsWith(github.head_ref, 'release-please-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0 # Full history for gitleaks
      - name: Use Node.js 24.x
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Format check
        run: npm run format:check
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit-and-integration:
    name: Unit & Integration Tests
    if: ${{ !startsWith(github.head_ref, 'release-please-') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0 # Full history: better SonarQube relevancy
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - name: Test and Coverage
        run: |
          echo "## Unit Tests & Coverage" >> $GITHUB_STEP_SUMMARY
          npm run test:coverage
      - name: Integration tests (real DB / SAM / dependency contracts)
        if: matrix.node-version == '24.x'
        run: |
          echo "## Integration Tests" >> $GITHUB_STEP_SUMMARY
          npm run test:integration
      - name: Ensure tests leave no artifacts in the working tree
        if: matrix.node-version == '24.x'
        run: |
          leaked=$(ls -1 dummy-path.log* src/client/dummy-path.log* data/rules.*.test.yaml 2>/dev/null || true)
          if [ -n "$leaked" ]; then
            echo "::error::Tests wrote artifacts into the repo (should use os.tmpdir):"
            echo "$leaked"
            exit 1
          fi
          echo "No test artifacts leaked into the working tree."
      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]' && matrix.node-version == '22.x'
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        with:
          args: -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e-tests:
    name: Playwright E2E Tests
    if: ${{ !startsWith(github.head_ref, 'release-please-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Use Node.js 24.x
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - name: Get Playwright Version
        id: playwright-version
        run: echo "version=$(npm view @playwright/test version)" >> $GITHUB_OUTPUT
      - name: Cache Playwright Browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Install Playwright System Deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
      - name: Run Playwright E2E Smoke Tests
        run: npm run test:e2e
        env:
          WISHBOARD_ADMIN_SECRET: e2e-admin-password
      - name: Clean up E2E Test DB
        if: always()
        run: rm -f data/e2e-test.db data/e2e-test.db-shm data/e2e-test.db-wal

  # Aggregate gate with a stable name for branch-protection required checks.
  ci-success:
    name: CI Success
    if: always()
    needs: [quality-checks, unit-and-integration, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Verify build result
        run: |
          q_res="${{ needs.quality-checks.result }}"
          u_res="${{ needs.unit-and-integration.result }}"
          e_res="${{ needs.e2e-tests.result }}"
          echo "quality-checks result: $q_res"
          echo "unit-and-integration result: $u_res"
          echo "e2e-tests result: $e_res"
          for res in "$q_res" "$u_res" "$e_res"; do
            if [ "$res" = "failure" ] || [ "$res" = "cancelled" ]; then
              exit 1
            fi
          done
