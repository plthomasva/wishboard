name: Release & Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release.outputs['paths_._tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  build-and-publish-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize tag name
        id: sanitize
        run: |
          RAW_TAG="${{ needs.release-please.outputs.tag_name }}"
          CLEAN_TAG="${RAW_TAG#wishboard-}"
          echo "clean_tag=$CLEAN_TAG" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.sanitize.outputs.clean_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.sanitize.outputs.clean_tag }}
            type=semver,pattern={{major}},value=${{ steps.sanitize.outputs.clean_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
